version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: taktos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: taktos
      POSTGRES_USER: taktos
      POSTGRES_PASSWORD: taktos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taktos -d taktos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: taktos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
